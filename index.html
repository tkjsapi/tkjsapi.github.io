<!DOCTYPE html>
<html>
<head>
	<title>Page Title</title>
	<link rel="icon" href="./DGJAPI.png" type="image/png">
	<title>DGJAPI - A MIDDLE SCHOOL STUDENT'S API</title>
</head>
<body>	
	<style>
		.box {
			background:rgb(12,50,9);
			color:rgb(150,200,255);
			margin:0 auto;
			width:fit-content;
			border-radius: 8px;
			margin-bottom: 20px;
		}
		.label {
			font-family:"Courier New","Consolas",monospace;
			margin:0 auto;
			width:fit-content;
			font-size:42px;
		}
		.df {
			background-color: blue;
		}
	</style>
	<script src='./api/tkjs/tkinterjs.js'></script>
	<script src="./api/tkjs/messagebox.js"></script>
	<script src="./api/tkjs/progress.js"></script>
	<script src="./api/tkjs/canvas.js"></script>
	<script>
		let root = tk.Tk()
		let name = ""
		let a = messagebox.showinput(root,"input","what your name?",function(name){let b = messagebox.showinfo(root,"welcome",`欢迎${name}来到dgjapi!`)})

		let titlebox = tk.Frame(root,"box","titlebox",1600,50)
		let title = tk.Label(titlebox,"label","title","DGJAPI")

		let apilistbox = tk.Frame(root,"box","apilistbox",1600,800)
		let apilisttilte = tk.Label(apilistbox,"label","apilisttitle_","API列表")
		let apilist = new tk.Listbox(apilistbox,"lb","listbox")
		apilist.appEnd(tk.ListboxLine(apilist.getObj(),"li","tkjs_line","TkJS"))

		let df = tk.DragFrame(apilistbox,"df",".df")
		let dftxt = tk.Label(df,"label","dftxt.","拖我")

		let pr = new Progress(root,"a1","a2","b1","b2",400,20)
		
		let up = tk.Button(root,"a3","b3","up()",function(){pr.up()})

		let canv = new Canvas(root,"a4","b4",500,500)

		
		for (let i = 0;i <= 3;i++){
			for (let j = 0;j<=3;j++){
				canv.create_rectangle(new Vec2d(50+i*50,50+j*50),100,100)
			}
		}
	</script>
</body>
</html>
